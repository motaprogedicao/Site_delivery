<!--exibindo itens do carrinho-->

<script>
       
 var carrinhoRecuperado = JSON.parse(localStorage.getItem('cr'));
let lista = document.getElementById("carrinhoid");  //acessando elemento html pelo id atrapves do DOM
for (let i = 0; i < carrinhoRecuperado.length; i++) { 
  var item = carrinhoRecuperado[i]; //
  const div = document.createElement("li");
  div.textContent = `${item.nome} - R$${item.preco}`
  lista.appendChild(div);
}

  </script>
