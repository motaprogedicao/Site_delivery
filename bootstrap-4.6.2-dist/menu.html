<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
  <title>Cardápio - Delivery Rápido</title>
</head>


<body>
  <!--barra de navegação com logo e link de carrinho-->  
  <header>
  <nav class= "navbar navbar-expand-md navbar-light fixed-top bg-warning"> <!--barra de navegação navbar-expand-md:só aparece responsivamente-->
    <div class="container">
    <a href="index.html" class="navbar-brand">
        <img src="img/logo.svg" width="70px">
      </a>
    </div>  

      <div class="collapse navbar-collapse"> <!--utilizado para criar a ul-->
       <ul class="navbar-nav ml-auto"> <!--ml-auto margin left auto-->
        <li class="nav-tem"> 
        <a href="carrinho.html" class="nav-link">Ver Carrinho</a>
        </li>
        </ul>
      </div>
      </nav>
    
    </header>
  <main>
    <h1>Cardápio</h1>
    <section class="produtos">
      <!-- Produto 1 -->
      <div class="produto" data-id="1" data-nome="Pizza Margherita" data-preco="30">
        <img src="img/pizza.jpg" alt="Pizza Margherita" />
        <h2>Pizza Margherita</h2>
        <p>R$ 30,00</p>
        <button class="adicionar">Adicionar ao carrinho</button>
      </div>

      <!-- Produto 2 -->
      <div class="produto" data-id="2" data-nome="Hambúrguer Artesanal" data-preco="25">
        <img src="img/hamburguer.jpg" alt="Hambúrguer Artesanal" />
        <h2>Hambúrguer Artesanal</h2>
        <p>R$ 25,00</p>
        <button class="adicionar">Adicionar ao carrinho</button>
      </div>

      <!-- Produto 3 -->
      <div class="produto" data-id="3" data-nome="Suco Natural" data-preco="8">
        <img src="img/suco.jpg" alt="Suco Natural" />
        <h2>Suco Natural</h2>
        <p>R$ 8,00</p>
        <button class="adicionar">Adicionar ao carrinho</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
   
</body>
</html>
