<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cardápio - Delivery Rápido</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Cardápio</h1>

    <nav>
        <a href="carrinho.html">Ver Carrinho</a>
        <a href="index.html">Página inicial</a>
      </nav>
  
  </header>

  <main>
    <section class="produtos">
      <!-- Produto 1 -->
      <div class="produto" data-id="1" data-nome="Pizza Margherita" data-preco="30">
        <img src="img/pizza.jpg" alt="Pizza Margherita" />
        <h2>Pizza Margherita</h2>
        <p>R$ 30,00</p>
        <button class="adicionar">Adicionar ao carrinho</button>
      </div>

      <!-- Produto 2 -->
      <div class="produto" data-id="2" data-nome="Hambúrguer Artesanal" data-preco="25">
        <img src="img/hamburguer.jpg" alt="Hambúrguer Artesanal" />
        <h2>Hambúrguer Artesanal</h2>
        <p>R$ 25,00</p>
        <button class="adicionar">Adicionar ao carrinho</button>
      </div>

      <!-- Produto 3 -->
      <div class="produto" data-id="3" data-nome="Suco Natural" data-preco="8">
        <img src="img/suco.jpg" alt="Suco Natural" />
        <h2>Suco Natural</h2>
        <p>R$ 8,00</p>
        <button class="adicionar">Adicionar ao carrinho</button>
      </div>
    </section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
